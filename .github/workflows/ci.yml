name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

env:
  MATURIN_VERSION: "1.14.1"
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.24"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99 # redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@c93f4f9c67595668add93d3d6895795ce52d8c2d # 1.85.0
        with:
          components: clippy, rustfmt

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install JuiceFS
        run: |
          curl -fsSL https://d.juicefs.com/install | sh -
          juicefs version

      - name: Start MinIO
        run: |
          docker run -d --name smolfs-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e server /data
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            echo "Waiting for MinIO ($attempt/30)"
            sleep 1
          done
          docker logs smolfs-minio
          exit 1

      - name: Create MinIO bucket
        run: |
          docker run --rm --network host --entrypoint sh minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727 -c \
            "mc alias set local http://127.0.0.1:9000 minioadmin minioadmin && mc mb -p local/smolfs-ci"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build Rust CLI
        run: cargo build --locked -p smolfs-cli

      - name: Smoke-test Rust CLI
        run: ./target/debug/smolfs --help

      - name: Smoke-test installer Python SDK path
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          uv init --bare --name smolfs-install-smoke
          SMOLFS_INSTALL_CLI=0 \
            SMOLFS_INSTALL_PYTHON=1 \
            SMOLFS_PYTHON_MODE=project \
            SMOLFS_PYTHON_PACKAGE=typing-extensions \
            "$GITHUB_WORKSPACE/scripts/install.sh"
          grep -q "typing-extensions" pyproject.toml

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run MinIO integration tests
        env:
          SMOLFS_RUN_INTEGRATION: "1"
          SMOLFS_TEST_REDIS_METADATA_URL: redis://127.0.0.1:6379/1
          SMOLFS_TEST_S3_BUCKET: http://127.0.0.1:9000/smolfs-ci
          ACCESS_KEY: minioadmin
          SECRET_KEY: minioadmin
        run: cargo test -p smolfs-juicefs --test minio_integration -- --nocapture

      - name: Build Python wheel
        run: uvx maturin==${{ env.MATURIN_VERSION }} build --manifest-path bindings/python/Cargo.toml --interpreter python --out dist

      - name: Smoke-test Python SDK
        run: uv run --isolated --with "$(find dist -name '*.whl' -print -quit)" python -c "from smolfs import SmolFS, SmolFSError, doctor; assert 'juicefs' in doctor()"
