name: Publish CLI

on:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-cli:
    name: Build CLI on ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@c93f4f9c67595668add93d3d6895795ce52d8c2d # 1.85.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: publish-cli-${{ matrix.target }}

      - name: Cache Linux arm64 apt packages
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .apt-cache/archives
          key: ubuntu-24.04-apt-aarch64-cross-gcc-qemu-v2

      - name: Install Linux arm64 build tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        timeout-minutes: 15
        run: |
          set -euo pipefail
          mkdir -p .apt-cache/archives/partial
          trap 'sudo chown -R "$USER:$USER" .apt-cache || true' EXIT
          sudo apt-get update \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="$PWD/.apt-cache/archives" \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30 \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross qemu-user

      - name: Build Rust CLI
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release -p smolfs-cli --target ${{ matrix.target }}

      - name: Smoke-test Rust CLI
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            qemu-aarch64 -L /usr/aarch64-linux-gnu ./target/${{ matrix.target }}/release/smolfs --help
          else
            ./target/${{ matrix.target }}/release/smolfs --help
          fi

      - name: Package Rust CLI
        run: |
          set -euo pipefail
          mkdir -p package dist
          cp ./target/${{ matrix.target }}/release/smolfs package/smolfs
          tar -C package -czf dist/smolfs-${{ matrix.target }}.tar.gz smolfs

      - name: Upload CLI artifact
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smolfs-${{ matrix.target }}
          path: dist/*
          retention-days: 3

  publish-stable-cli:
    name: Publish stable CLI release assets
    runs-on: ubuntu-24.04
    needs: build-cli
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish CLI assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" dist/*.tar.gz --clobber

  publish-dev-cli:
    name: Publish dev CLI release assets
    runs-on: ubuntu-24.04
    needs: build-cli
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish dev CLI assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: dev
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi
          if gh api "repos/$GH_REPO/git/ref/tags/$TAG" >/dev/null 2>&1; then
            gh api -X DELETE "repos/$GH_REPO/git/refs/tags/$TAG" >/dev/null
          fi

          notes_file="$(mktemp)"
          {
            echo "Latest successful CLI build from main."
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "This dev release is deleted and recreated on every push to main."
          } > "$notes_file"

          gh release create "$TAG" dist/*.tar.gz \
            --target "$GITHUB_SHA" \
            --title "dev" \
            --notes-file "$notes_file" \
            --prerelease \
            --latest=false
