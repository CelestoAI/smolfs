name: Publish Node Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  NODE_VERSION: "24"

jobs:
  build-native:
    name: Build Node native binding on ${{ matrix.node_target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            node_target: linux-x64-gnu
            smoke: true
          - os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
            node_target: linux-arm64-gnu
            smoke: false
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            node_target: darwin-arm64
            smoke: true
          - os: macos-15-intel
            rust_target: x86_64-apple-darwin
            node_target: darwin-x64
            smoke: true

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@c93f4f9c67595668add93d3d6895795ce52d8c2d # 1.85.0
        with:
          targets: ${{ matrix.rust_target }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install Linux arm64 build tools
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        timeout-minutes: 15
        run: |
          set -euo pipefail
          sudo apt-get update \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=30 \
            -o Acquire::https::Timeout=30 \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install TypeScript SDK dependencies
        working-directory: bindings/node
        run: npm ci

      - name: Build native binding
        working-directory: bindings/node
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: npm run build -- --target ${{ matrix.rust_target }}

      - name: Smoke-test native binding
        if: matrix.smoke
        working-directory: bindings/node
        run: node -e "const { doctor } = require('./index.js'); const report = doctor(); if (!report.storageBackend) process.exit(1)"

      - name: Upload native binding artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smolfs-${{ matrix.node_target }}
          path: bindings/node/smolfs.${{ matrix.node_target }}.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-24.04
    needs: build-native
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Check release tag matches package versions
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)
          node_version=$(node -p "require('./bindings/node/package.json').version")
          if [ "$tag_version" != "$cargo_version" ] || [ "$tag_version" != "$node_version" ]; then
            echo "Release tag v$tag_version does not match Cargo version $cargo_version and Node package version $node_version"
            exit 1
          fi

      - name: Download native binding artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: bindings/node
          merge-multiple: true

      - name: Install TypeScript SDK dependencies
        working-directory: bindings/node
        run: npm ci

      - name: Verify npm package contents
        working-directory: bindings/node
        run: |
          set -euo pipefail
          for target in darwin-arm64 darwin-x64 linux-arm64-gnu linux-x64-gnu; do
            test -f "smolfs.$target.node"
          done
          npm pack --dry-run --json

      - name: Publish package
        working-directory: bindings/node
        run: npm publish --access public
